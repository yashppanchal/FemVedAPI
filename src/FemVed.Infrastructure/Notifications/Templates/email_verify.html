<!--subject: Verify your FemVed email address-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify your email</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f7f3ef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#2d3a2e;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f3ef;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <tr>
            <td style="background-color:#3d5a40;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:600;letter-spacing:0.5px;">FemVed</h1>
              <p style="margin:6px 0 0;color:#d9e4d8;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;">Verify Your Email</p>
            </td>
          </tr>
          <tr>
            <td style="padding:40px;">
              <h2 style="margin:0 0 16px;font-size:22px;font-weight:600;color:#2d3a2e;">Hi {{firstName}},</h2>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#4a554b;">
                Welcome to FemVed! Please confirm your email address so we know it's really you.
              </p>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:24px auto;">
                <tr><td style="background-color:#3d5a40;border-radius:6px;">
                  <a href="{{verifyUrl}}" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:0.3px;">Verify Email</a>
                </td></tr>
              </table>

              <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#7a857b;text-align:center;">
                Or copy this link: <a href="{{verifyUrl}}" style="color:#3d5a40;word-break:break-all;">{{verifyUrl}}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="background-color:#f7f3ef;padding:20px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a8a1;">&copy; {{year}} FemVed. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
