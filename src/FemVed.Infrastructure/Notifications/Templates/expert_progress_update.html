<!--subject: A message from your FemVed expert-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A note from your expert</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f7f3ef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#2d3a2e;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f3ef;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <tr>
            <td style="background-color:#3d5a40;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:600;letter-spacing:0.5px;">FemVed</h1>
              <p style="margin:6px 0 0;color:#d9e4d8;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;">A Note from Your Expert</p>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 40px 16px;">
              <h2 style="margin:0 0 16px;font-size:22px;font-weight:600;color:#2d3a2e;">Hi {{firstName}},</h2>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#4a554b;">
                Your expert has sent a note about your progress:
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f3ef;border-left:4px solid #3d5a40;border-radius:4px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <p style="margin:0;font-size:15px;line-height:1.7;color:#2d3a2e;white-space:pre-wrap;">{{updateNote}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 32px;">
              <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#4a554b;">
                If you'd like to respond, just reply to this email — we'll forward your message to your expert.
              </p>
              <p style="margin:0;font-size:16px;line-height:1.6;color:#4a554b;">Warmly,<br/>The FemVed Team</p>
            </td>
          </tr>
          <tr>
            <td style="background-color:#f7f3ef;padding:20px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a8a1;">&copy; {{year}} FemVed. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
