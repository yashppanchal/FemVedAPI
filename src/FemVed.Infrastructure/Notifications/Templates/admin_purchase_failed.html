<!--subject: [Admin] Payment failed — {{userName}} (order {{orderId}})-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment failed (admin)</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f7f3ef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#2d3a2e;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f3ef;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <tr>
            <td style="background-color:#3d5a40;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:600;letter-spacing:0.5px;">FemVed</h1>
              <p style="margin:6px 0 0;color:#d9e4d8;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;">Admin Notification — Payment Failed</p>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 40px 16px;">
              <h2 style="margin:0 0 16px;font-size:22px;font-weight:600;color:#2d3a2e;">A payment didn't complete</h2>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#4a554b;">
                <strong>{{userName}}</strong> attempted a purchase but the payment failed. No charge was made.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f3ef;border-radius:8px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr><td style="padding:4px 0;font-size:14px;color:#7a857b;width:140px;">User</td><td style="padding:4px 0;font-size:14px;color:#2d3a2e;font-weight:600;">{{userName}}</td></tr>
                      <tr><td style="padding:4px 0;font-size:14px;color:#7a857b;">User email</td><td style="padding:4px 0;font-size:14px;color:#2d3a2e;"><a href="mailto:{{userEmail}}" style="color:#3d5a40;text-decoration:none;">{{userEmail}}</a></td></tr>
                      <tr><td style="padding:4px 0;font-size:14px;color:#7a857b;">Order ID</td><td style="padding:4px 0;font-size:13px;color:#7a857b;font-family:monospace;">{{orderId}}</td></tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="background-color:#f7f3ef;padding:20px 40px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a8a1;">&copy; {{year}} FemVed. Admin notification.</p>
            </td>
          </tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
